services:
  # PostgreSQL Database
  - type: postgresql
    name: legaforce-db
    plan: starter
    region: ohio
    databaseName: legaforce
    ipAllowList: []

  # Node.js Backend API
  - type: web
    name: legaforce-api
    env: node
    plan: starter
    region: ohio
    buildCommand: cd server && npm install && npm run prisma:generate
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: legaforce-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: ARCJET_KEY
        sync: false
      - key: ARCJET_ENV
        value: production
      - key: SENDGRID_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://your-vercel-url.vercel.app
      - key: SERVER_URL
        value: https://legaforce-api.onrender.com
      - key: LOG_LEVEL
        value: info
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envSpecific:
      preDeployCommand: cd server && npm run prisma:push && npm run prisma:seed || true
